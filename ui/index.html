<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maple.AI Copilot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            transition: all 0.5s ease;
        }

        /* Dark theme (default) */
        body.dark-theme {
            background: #000;
            color: #fff;
        }

        body.dark-theme .gradient-bg {
            background: radial-gradient(ellipse at center top, rgba(138, 97, 255, 0.3) 0%, transparent 60%);
        }

        body.dark-theme .get-started-btn {
            background: #1a1a1a;
            color: #fff;
        }

        body.dark-theme .theme-toggle {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        body.dark-theme .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Light theme */
        body.light-theme {
            background: linear-gradient(135deg, #e6f3ff 0%, #f0e6ff 25%, #e6f0ff 50%, #f5f0ff 75%, #e8f4ff 100%);
            color: #2c3e50;
        }

        body.light-theme .gradient-bg {
            background: radial-gradient(ellipse at center top, rgba(147, 112, 219, 0.15) 0%, rgba(173, 216, 230, 0.1) 40%, transparent 70%);
        }

        body.light-theme .title .maple {
            color: #40a080;
        }

        body.light-theme .title .copilot {
            color: #2c3e50;
        }

        body.light-theme .subtitle {
            color: rgba(44, 62, 80, 0.7);
        }

        body.light-theme .get-started-btn {
            background: rgba(44, 62, 80, 0.9);
            color: #fff;
        }

        body.light-theme .get-started-btn:hover {
            background: rgba(44, 62, 80, 1);
            box-shadow: 0 10px 30px rgba(64, 160, 128, 0.3);
        }

        body.light-theme .cube-face {
            background: rgba(64, 160, 128, 0.1);
            border: 2px solid #40a080;
        }

        body.light-theme .theme-toggle {
            background: rgba(44, 62, 80, 0.1);
            color: #2c3e50;
        }

        body.light-theme .theme-toggle:hover {
            background: rgba(44, 62, 80, 0.2);
        }

        /* Purple gradient background */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center top, rgba(138, 97, 255, 0.3) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
            transition: all 0.5s ease;
        }

        /* Theme toggle button */
        .theme-toggle {
            position: fixed;
            top: 30px;
            right: 40px;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .theme-icon {
            width: 24px;
            height: 24px;
            transition: all 0.3s ease;
        }

        /* Main container */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Logo and title */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .logo {
            width: 60px;
            height: 60px;
            position: relative;
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotateX(30deg) rotateY(45deg); }
            100% { transform: rotateX(30deg) rotateY(405deg); }
        }

        .cube-face {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(64, 255, 200, 0.1);
            border: 2px solid #40FFC8;
            transition: all 0.5s ease;
        }

        .cube-face:nth-child(1) { transform: translateZ(30px); }
        .cube-face:nth-child(2) { transform: rotateY(90deg) translateZ(30px); }
        .cube-face:nth-child(3) { transform: rotateY(180deg) translateZ(30px); }
        .cube-face:nth-child(4) { transform: rotateY(-90deg) translateZ(30px); }
        .cube-face:nth-child(5) { transform: rotateX(90deg) translateZ(30px); }
        .cube-face:nth-child(6) { transform: rotateX(-90deg) translateZ(30px); }

        .title {
            font-size: 72px;
            font-weight: 700;
            display: flex;
            align-items: baseline;
        }

        .maple {
            color: #40FFC8;
            transition: color 0.5s ease;
        }

        .copilot {
            color: #fff;
            margin-left: 20px;
            transition: color 0.5s ease;
        }

        /* Subtitle */
        .subtitle {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            max-width: 800px;
            line-height: 1.5;
            margin-bottom: 50px;
            transition: color 0.5s ease;
        }

        /* Get Started button */
        .get-started-btn {
            background: #1a1a1a;
            color: #fff;
            border: none;
            padding: 18px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .get-started-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(64, 255, 200, 0.2), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .get-started-btn:hover::before {
            transform: translateX(100%);
        }

        .get-started-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(64, 255, 200, 0.3);
        }

        .arrow {
            font-size: 20px;
        }

        /* Blank page styles */
        .blank-page {
            display: none;
            min-height: 100vh;
            background: #000;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .title {
                font-size: 48px;
            }
            
            .theme-toggle {
                top: 20px;
                right: 20px;
                width: 45px;
                height: 45px;
            }
            
            .theme-icon {
                width: 20px;
                height: 20px;
            }
        }
    </style>
</head>
<body class="dark-theme">
    <!-- Purple gradient background -->
    <div class="gradient-bg"></div>

    <!-- Theme toggle button -->
    <button class="theme-toggle" onclick="toggleTheme()">
        <svg class="theme-icon sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="theme-icon moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>

    <!-- Main content -->
    <div class="container" id="mainPage">
        <div class="logo-container">
            <div class="logo">
                <div class="cube">
                    <div class="cube-face"></div>
                    <div class="cube-face"></div>
                    <div class="cube-face"></div>
                    <div class="cube-face"></div>
                    <div class="cube-face"></div>
                    <div class="cube-face"></div>
                </div>
            </div>
            <h1 class="title">
                <span class="maple">Maple.AI</span>
                <span class="copilot">Copilot</span>
            </h1>
        </div>

        <p class="subtitle">
            Your integrated environment for seamless research and coding. Turn insights into implementation, instantly.
        </p>

        <button class="get-started-btn" onclick="navigateToBlankPage()">
            Get Started
            <span class="arrow">→</span>
        </button>
    </div>

    <!-- Blank page -->
    <div class="blank-page" id="blankPage"></div>

    <script>
        let isDarkTheme = true;

        function toggleTheme() {
            const body = document.body;
            const sunIcon = document.querySelector('.sun-icon');
            const moonIcon = document.querySelector('.moon-icon');
            
            if (isDarkTheme) {
                // Switch to light theme
                body.classList.remove('dark-theme');
                body.classList.add('light-theme');
                sunIcon.style.display = 'block';
                moonIcon.style.display = 'none';
                isDarkTheme = false;
            } else {
                // Switch to dark theme
                body.classList.remove('light-theme');
                body.classList.add('dark-theme');
                sunIcon.style.display = 'none';
                moonIcon.style.display = 'block';
                isDarkTheme = true;
            }

            // Add a small animation effect to the toggle button
            const toggleBtn = document.querySelector('.theme-toggle');
            toggleBtn.style.transform = 'scale(0.9)';
            setTimeout(() => {
                toggleBtn.style.transform = 'scale(1)';
            }, 150);
        }

        function navigateToBlankPage() {
            // Hide main page and show blank page
            document.getElementById('mainPage').style.display = 'none';
            document.getElementById('blankPage').style.display = 'block';
            document.querySelector('.theme-toggle').style.display = 'none';
            document.querySelector('.gradient-bg').style.display = 'none';
        }
    </script>
</body>
</html>
