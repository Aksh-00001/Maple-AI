version: '3.8'

services:
  backend:
    build:
      context: ./maple-ai-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - FRONTEND_URL=http://localhost:3000
      - PORT=8000
    volumes:
      - ./maple-ai-backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./maple-ai-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

